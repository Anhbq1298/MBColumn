name: .NET CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore MBColumn.sln

      - name: Build
        run: dotnet build MBColumn.sln --configuration Release --no-restore

      - name: Test
        run: dotnet run --project tests/MBColumn.Tests/MBColumn.Tests.csproj --configuration Release --no-build
