<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
{{KATEX_CSS}}
  </style>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      color: {{TEXT_COLOR}};
      font-family: "Segoe UI Variable Text", "Segoe UI", "Aptos", "Arial", sans-serif;
    }

    .math-container {
      display: flex;
      align-items: center;
      min-height: {{MIN_HEIGHT}}px;
      font-size: {{FONT_SIZE}}px;
      line-height: 1.35;
      color: {{TEXT_COLOR}};
      padding: 0;
      box-sizing: border-box;
    }

    .katex {
      color: {{TEXT_COLOR}};
      font-size: 1em;
    }

    /* Use sans-serif for all math-mode characters */
    .katex .katex-mathit,
    .katex .mathdefault,
    .katex .mord,
    .katex .mop,
    .katex .mbin,
    .katex .mrel,
    .katex .mpunct,
    .katex .mopen,
    .katex .mclose,
    .katex .minner {
      font-family: "Arial", "Segoe UI", sans-serif;
    }
    .katex .katex-mathit,
    .katex .mathdefault {
      font-style: italic;
    }
    .katex .mtext,
    .katex .text {
      font-family: "Arial", "Segoe UI", sans-serif;
      font-style: normal;
    }
  </style>
</head>
<body>
  <div id="math" class="math-container"></div>
  <script>
{{KATEX_JS}}
  </script>
  <script>
    function report(type, payload) {
      if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(Object.assign({ type: type }, payload || {}));
      }
    }

    function renderEquation(latex, displayMode) {
      try {
        katex.render(latex, document.getElementById("math"), {
          throwOnError: false,
          displayMode: displayMode,
          strict: "ignore"
        });

        // Wait for KaTeX fonts to finish loading before reporting dimensions,
        // so the host knows the equation is truly fully rendered.
        document.fonts.ready.then(function () {
          report("rendered", {
            width: Math.ceil(document.body.scrollWidth),
            height: Math.ceil(document.body.scrollHeight)
          });
        });
      }
      catch (err) {
        report("error", { message: err && err.message ? err.message : "KaTeX render failed" });
      }
    }

    renderEquation({{LATEX_JSON}}, {{DISPLAY_MODE}});
  </script>
</body>
</html>
